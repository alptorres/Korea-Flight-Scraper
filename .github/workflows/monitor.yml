name: Korea Flight Monitor

on:
  workflow_dispatch:        # 👈 enables manual runs
  schedule:
    - cron: "0 * * * *"       # every hour, at minute 0
    - cron: "0 4 * * *"       # 12:00 PM Philippine time (UTC+8)


permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          pip install selenium requests matplotlib pandas
          sudo apt-get update
          sudo apt-get install chromium-browser chromium-chromedriver -y

      - name: Run monitor
        run: python monitor.py

      - name: Commit graph
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *')
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add prices.png
          git commit -m "Update flight price graph" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

